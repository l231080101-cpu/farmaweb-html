<style>
    /* Intento por CSS: Oculta cualquier elemento que contenga el icono de carrito */
    header i[data-lucide="shopping-cart"],
    nav i[data-lucide="shopping-cart"],
    .header-actions i[data-lucide="shopping-cart"],
    button:has(i[data-lucide="shopping-cart"]) {
        display: none !important;
    }

    /* Evitamos que se oculte el del panel de estadísticas */
    .summary-card-icon.pedidos i[data-lucide="shopping-cart"] {
        display: inline-block !important;
    }
</style>

<div class="admin-dashboard-container">
    <div class="dashboard-header">
        <div>
            <h1>Panel de Administración</h1>
            <p>Monitorea y gestiona tu farmacia en tiempo real</p>
        </div>
        <div class="dashboard-actions">
            <select class="dashboard-select">
                <option value="this-week">Esta semana</option>
                <option value="last-week">Semana pasada</option>
                <option value="this-month">Este mes</option>
                <option value="last-month">Mes pasado</option>
            </select>
            <button class="dashboard-export-btn">
                <i data-lucide="download"></i>
                <span>Exportar</span>
            </button>
        </div>
    </div>

    <div class="summary-cards-grid">
        <div class="summary-card">
            <div class="summary-card-header">
                <div class="summary-card-icon ingresos">
                    <i data-lucide="dollar-sign"></i>
                </div>
                <span class="summary-card-trend positive">
                    <i data-lucide="trending-up"></i> +12.5%
                </span>
            </div>
            <h2>$43,500</h2>
            <p>Ingresos Totales</p>
        </div>
        <div class="summary-card">
            <div class="summary-card-header">
                <div class="summary-card-icon pedidos">
                    <i data-lucide="shopping-cart"></i>
                </div>
                <span class="summary-card-trend positive">
                    <i data-lucide="trending-up"></i> +8.2%
                </span>
            </div>
            <h2>125</h2>
            <p>Pedidos</p>
        </div>
        <div class="summary-card">
            <div class="summary-card-header">
                <div class="summary-card-icon clientes">
                    <i data-lucide="users"></i>
                </div>
                <span class="summary-card-trend positive">
                    <i data-lucide="trending-up"></i> +15.3%
                </span>
            </div>
            <h2>342</h2>
            <p>Clientes Activos</p>
        </div>
        <div class="summary-card">
            <div class="summary-card-header">
                <div class="summary-card-icon ticket">
                    <i data-lucide="package"></i>
                </div>
                <span class="summary-card-trend negative">
                    <i data-lucide="trending-down"></i> -2.1%
                </span>
            </div>
            <h2>$348.00</h2>
            <p>Ticket Promedio</p>
        </div>
    </div>

    <div class="charts-and-lists-grid">
        <div class="chart-card">
            <h3>Ventas de la Semana</h3>
            <div style="position: relative; height: 300px;">
                <canvas id="weeklySalesChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>Distribución por Categoría</h3>
            <div style="position: relative; height: 300px;">
                <canvas id="categoryDistributionChart"></canvas>
            </div>
        </div>
        <div class="chart-card" style="grid-column: 1 / -1;">
            <h3>Tendencia de Ventas Mensual</h3>
            <div style="position: relative; height: 300px;">
                <canvas id="monthlySalesChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        function removeCartIcon() {
            // Buscamos todos los iconos de carrito
            const icons = document.querySelectorAll('i[data-lucide="shopping-cart"]');
            icons.forEach(icon => {
                // Si NO está dentro de una summary-card, lo eliminamos
                if (!icon.closest('.summary-card')) {
                    // Eliminamos el botón que lo contiene o el icono mismo
                    const parentButton = icon.closest('button') || icon.closest('a');
                    if (parentButton) {
                        parentButton.style.display = 'none';
                    } else {
                        icon.style.display = 'none';
                    }
                }
            });
        }

        // Ejecutar inmediatamente
        removeCartIcon();
        
        // Ejecutar después de un segundo por si los iconos tardan en cargar
        setTimeout(removeCartIcon, 500);
        setTimeout(removeCartIcon, 2000);
    })();
</script>
